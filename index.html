<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrestaJara</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f4f7f6;
    }
    iframe {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;
    }
  </style>
</head>
<body>
  <iframe id="app-frame" allowfullscreen="true"></iframe>

  <script>
    // PEGA AQUÍ TU ENLACE LARGO DE APPS SCRIPT (EL QUE TERMINA EN /exec)
    var scriptUrl = "https://script.google.com/macros/s/AKfycbyXlpoWN8zqybpW4UPU9_CejUb6wt_dbtDcYc5UzGykYznS8PDFvYWy_-8xFk1pfyYeUg/exec";
    
    // Esto "atrapa" lo que mandó tu menú (ej. ?page=clientes)
    var params = window.location.search;
    
    // Carga el iframe con la página correcta
    document.getElementById('app-frame').src = scriptUrl + params;
  </script>
</body>
</html>
